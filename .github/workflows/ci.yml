name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  workflow-lint:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Lint GitHub workflows
        uses: rhysd/actionlint@v1.7.11

  quality-gates:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Build package
        run: npm run build

      - name: Smoke built CLI
        run: npm run smoke:built-cli

      - name: Smoke packed install
        run: npm run smoke:packed-install

      - name: Smoke GitHub git install
        run: npm run smoke:git-install

      - name: Collect npm audit report
        run: |
          mkdir -p tmp
          npm audit --json > tmp/npm-audit.json || true
          node scripts/audit-report.mjs tmp/npm-audit.json

      - name: Upload npm audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-report
          path: tmp/npm-audit.json

  fresh-clone-verify:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Verify from a fresh workspace copy
        run: npm run verify:fresh-clone
