name: Dependency Hygiene

on:
  workflow_dispatch:
  schedule:
    - cron: "0 15 * * 1"

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: |
          mkdir -p tmp
          npm audit --json > tmp/npm-audit.json || true
          node scripts/audit-report.mjs tmp/npm-audit.json --fail-on-vulnerabilities

      - name: Upload npm audit report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: dependency-hygiene-audit-report
          path: tmp/npm-audit.json
